# ==========================================================
# StarBans Velocity Addon Configuration
# EN: This addon runs on Velocity and reads the same storage
#     as your backend StarBans plugin.
#     Network ban screens, shared prefixes and moderation
#     texts are taken from the backend snapshot.
# DE: Dieses Addon läuft auf Velocity und liest denselben
#     Speicher wie dein Backend-StarBans-Plugin.
#     Netzwerk-Ban-Screens, gemeinsame Prefixe und
#     Moderationstexte kommen aus dem Backend-Snapshot.
# ==========================================================

settings:
  # EN: Language file name inside the plugin folder.
  # DE: Name der Sprachdatei im Plugin-Ordner.
  language-file: lang-en.yml

# ----------------------------------------------------------
# EN: Shared storage settings.
#     Recommendation for proxy + backend: MARIADB.
#     SQLITE can work on one machine with one shared file,
#     but file locking can still be a limitation.
#     JSON is not recommended for proxy setups.
# DE: Gemeinsame Speicher-Einstellungen.
#     Empfehlung für Proxy + Backend: MARIADB.
#     SQLITE kann auf einer Maschine mit einer Datei laufen,
#     aber Dateisperren bleiben eine Einschränkung.
#     JSON wird für Proxy-Setups nicht empfohlen.
# ----------------------------------------------------------
database:
  type: MARIADB
  table-prefix: starbans

  json:
    file: storage/database.json

  sqlite:
    file: database/starbans.db

  mariadb:
    host: 127.0.0.1
    port: 3306
    database: starbans
    username: root
    password: change-me
    parameters: useUnicode=true&characterEncoding=utf8

  pool:
    maximum-pool-size: 6
    minimum-idle: 1
    connection-timeout-ms: 10000

# ----------------------------------------------------------
# EN: Proxy moderation checks.
# DE: Proxy-Moderationschecks.
# ----------------------------------------------------------
checks:
  # EN: Block joins if the player has an active player ban.
  # DE: Join blockieren, wenn der Spieler einen aktiven Spieler-Ban hat.
  player-ban: true

  # EN: Block joins if the connecting IP has an active IP ban.
  # DE: Join blockieren, wenn die verbindende IP einen aktiven IP-Ban hat.
  ip-ban: true

  # EN: Block joins if the connecting IP is blacklisted.
  # DE: Join blockieren, wenn die verbindende IP auf der Blacklist steht.
  ip-blacklist: true

tracking:
  # EN: Update the shared player profile with the proxy login IP.
  # DE: Das gemeinsame Spielerprofil mit der Proxy-Login-IP aktualisieren.
  store-last-ip: true

sync:
  online-enforcement:
    # EN: Re-check already connected proxy players against the shared DB.
    #     This makes backend bans feel network-wide within a short delay.
    # DE: Bereits verbundene Proxy-Spieler erneut gegen die gemeinsame DB prüfen.
    #     Dadurch wirken Backend-Bans mit kurzer Verzögerung netzwerkweit.
    enabled: true

    # EN: Re-check interval in seconds.
    # DE: Prüfintervall in Sekunden.
    interval-seconds: 2

bridge:
  # EN: Listen for backend -> proxy sync messages.
  #     Must match the backend StarBans config.
  # DE: Auf Backend -> Proxy Sync-Nachrichten hören.
  #     Muss mit der Backend-StarBans-Config übereinstimmen.
  enabled: true

  # EN: Custom plugin messaging channel for immediate network enforcement.
  # DE: Custom-Plugin-Messaging-Channel für sofortige Netzwerk-Durchsetzung.
  channel: starbans:sync

commands:
  aliases:
    - sbv
    - sbproxy

