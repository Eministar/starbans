# ==========================================================
# StarBans Discord Webhooks
# EN: This file is loaded separately from config.yml so every
#     Discord action can have its own layout, embeds and URLs.
# DE: Diese Datei wird getrennt von der config.yml geladen,
#     damit jede Discord-Aktion ihr eigenes Layout, Embeds
#     und eigene URLs haben kann.
# ==========================================================

# EN: Global webhook switch.
# DE: Globaler Webhook-Schalter.
enabled: false

# EN: Request timeout in milliseconds.
# DE: Anfrage-Timeout in Millisekunden.
timeout-ms: 5000

# EN: Log failed webhook deliveries to the console.
# DE: Fehlgeschlagene Webhook-Zustellungen in die Konsole loggen.
log-failures: true

# EN: Log successful webhook deliveries too.
# DE: Erfolgreiche Webhook-Zustellungen ebenfalls loggen.
log-deliveries: false

# EN: Global username / avatar fallback.
# DE: Globaler Fallback für Username / Avatar.
username: StarBans
avatar-url: ''

# EN: Optional default URL(s) used when an action has no own URL(s).
# DE: Optionale Standard-URL(s), wenn eine Aktion keine eigene URL hat.
default-url: ''
default-urls: []

# EN: Discord mention rules. Per-action overrides are also supported.
# DE: Discord-Mention-Regeln. Pro Aktion sind ebenfalls Overrides möglich.
allowed-mentions:
  parse: [ users, roles ]
  users: []
  roles: []
  replied-user: false

# EN: Useful placeholders:
#     {player} {player_uuid} {actor} {actor_uuid} {reason} {ip}
#     {case_id} {type} {type_key} {status} {status_key}
#     {category} {template_key} {tags} {tag_count} {points} {visibility}
#     {server_profile} {server_profile_name} {reference_case_id}
#     {created_at} {created_at_iso} {expires_at} {expires_at_iso}
#     {status_changed_at} {status_changed_at_iso}
#     {server_name} {server_version} {plugin_name} {plugin_version}
#     {online_players} {max_players} {event_time} {event_time_iso}
#     {related_count} {flagged_related_count} {related_players}
# DE: Nützliche Platzhalter:
#     {player} {player_uuid} {actor} {actor_uuid} {reason} {ip}
#     {case_id} {type} {type_key} {status} {status_key}
#     {category} {template_key} {tags} {tag_count} {points} {visibility}
#     {server_profile} {server_profile_name} {reference_case_id}
#     {created_at} {created_at_iso} {expires_at} {expires_at_iso}
#     {status_changed_at} {status_changed_at_iso}
#     {server_name} {server_version} {plugin_name} {plugin_version}
#     {online_players} {max_players} {event_time} {event_time_iso}
#     {related_count} {flagged_related_count} {related_players}

