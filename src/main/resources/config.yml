# ==========================================================
# StarBans Configuration
# EN: This file controls storage, moderation behaviour, GUI,
#     command overrides, security checks and webhook logging.
# DE: Diese Datei steuert Speicher, Moderationsverhalten, GUI,
#     Command-Overrides, Sicherheitschecks und Webhook-Logging.
# ==========================================================

# EN: Internal schema version for non-destructive config auto-updates.
# DE: Interne Schema-Version fuer nicht-destruktive Config-Auto-Updates.
config-version: '${project.version}'

# ----------------------------------------------------------
# EN: General plugin settings.
# DE: Allgemeine Plugin-Einstellungen.
# ----------------------------------------------------------
settings:
  # EN: Name of the language file inside the plugin folder.
  # DE: Name der Sprachdatei im Plugin-Ordner.
  language-file: lang-en.yml

  # EN: Date format for cases, notes and screens.
  # DE: Datumsformat für Cases, Notizen und Screens.
  date-format: dd.MM.yyyy HH:mm:ss

  # EN: Time zone used by the formatter. Use "system" to use the server system zone.
  # DE: Zeitzone für die Formatierung. Mit "system" wird die Server-Systemzone benutzt.
  timezone: system

  # EN: Logical server / backend identifier used for per-server rule profiles and webhook placeholders.
  # DE: Logische Server- / Backend-ID für serverbezogene Regelprofile und Webhook-Placeholder.
  server-id: default

# ----------------------------------------------------------
# EN: Storage configuration. Supported types: JSON, SQLITE, MARIADB.
#     Recommendation: SQLITE for most servers.
# DE: Speicher-Konfiguration. Unterstützte Typen: JSON, SQLITE, MARIADB.
#     Empfehlung: SQLITE für die meisten Server.
# ----------------------------------------------------------
database:
  # EN: Active storage type.
  # DE: Aktiver Speicher-Typ.
  type: SQLITE

  # EN: Prefix for SQL tables. The plugin will create *_cases and *_profiles.
  # DE: Prefix für SQL-Tabellen. Das Plugin erstellt *_cases und *_profiles.
  table-prefix: starbans

  json:
    # EN: JSON file path inside the plugin directory.
    # DE: JSON-Dateipfad innerhalb des Plugin-Ordners.
    file: storage/database.json

  sqlite:
    # EN: SQLite database file path inside the plugin directory.
    # DE: SQLite-Datenbankdatei innerhalb des Plugin-Ordners.
    file: database/starbans.db

  mariadb:
    # EN: MariaDB host.
    # DE: MariaDB-Host.
    host: 127.0.0.1
    # EN: MariaDB port.
    # DE: MariaDB-Port.
    port: 3306
    # EN: MariaDB database/schema name.
    # DE: MariaDB-Datenbank-/Schema-Name.
    database: starbans
    # EN: MariaDB username.
    # DE: MariaDB-Benutzername.
    username: root
    # EN: MariaDB password.
    # DE: MariaDB-Passwort.
    password: change-me
    # EN: Additional JDBC parameters.
    # DE: Zusätzliche JDBC-Parameter.
    parameters: useUnicode=true&characterEncoding=utf8

  pool:
    # EN: Maximum HikariCP pool size for MariaDB.
    # DE: Maximale HikariCP-Poolgröße für MariaDB.
    maximum-pool-size: 8
    # EN: Minimum idle connections for MariaDB.
    # DE: Minimale Idle-Verbindungen für MariaDB.
    minimum-idle: 2
    # EN: Connection timeout in milliseconds.
    # DE: Verbindungs-Timeout in Millisekunden.
    connection-timeout-ms: 10000

# ----------------------------------------------------------
# EN: Vanilla command override system.
#     If enabled, StarBans can take over commands like /ban, /ipban, /mute, /kick.
# DE: Vanilla-Command-Override-System.
#     Wenn aktiviert, kann StarBans Befehle wie /ban, /ipban, /mute, /kick übernehmen.
# ----------------------------------------------------------
command-overrides:
  enabled: true
  commands:
    ban:
      enabled: true
      name: ban
      aliases: []
    tempban:
      enabled: true
      name: tempban
      aliases: []
    ipban:
      enabled: true
      name: ipban
      aliases: [ banip, ip-ban, ban-ip ]
    unban:
      enabled: true
      name: unban
      aliases: [ pardon ]
    unipban:
      enabled: true
      name: unipban
      aliases: [ ipunban, unbanip, pardonip ]
    mute:
      enabled: true
      name: mute
      aliases: []
    tempmute:
      enabled: true
      name: tempmute
      aliases: []
    unmute:
      enabled: true
      name: unmute
      aliases: []
    kick:
      enabled: true
      name: kick
      aliases: []
    notes:
      enabled: false
      name: notes
      aliases: [ notehistory ]
    cases:
      enabled: false
      name: cases
      aliases: [ casehistory, history ]

# ----------------------------------------------------------
# EN: Proxy / network integration.
#     This section is informational for the Bukkit/Paper side.
#     Native Velocity execution is NOT provided by this jar.
# DE: Proxy- / Netzwerk-Integration.
#     Dieser Abschnitt ist für die Bukkit-/Paper-Seite gedacht.
#     Native Velocity-Ausführung wird von diesem Jar NICHT bereitgestellt.
# ----------------------------------------------------------
network:
  proxy-support:
    # EN: Set this to true if your Paper/Spigot server is behind Velocity or BungeeCord.
    # DE: Auf true setzen, wenn dein Paper-/Spigot-Server hinter Velocity oder BungeeCord läuft.
    enabled: false

    # EN: Informational mode. Supported values: NONE, VELOCITY, BUNGEECORD.
    # DE: Informationsmodus. Unterstützte Werte: NONE, VELOCITY, BUNGEECORD.
    mode: NONE

    # EN: Important reminder: this plugin jar still runs on Bukkit/Paper only.
    #     For a real Velocity plugin you need a dedicated Velocity bootstrap/module.
    # DE: Wichtiger Hinweis: Dieses Plugin-Jar läuft weiterhin nur auf Bukkit/Paper.
    #     Für ein echtes Velocity-Plugin brauchst du ein eigenes Velocity-Bootstrap-/Modul.
    native-velocity-jar-required: true

  velocity-bridge:
    # EN: Enable backend -> Velocity sync messages.
    #     This is used by the separate Velocity addon to enforce
    #     network-wide bans immediately after backend actions.
    #     Requires database.type=MARIADB for safe shared storage.
    # DE: Backend -> Velocity Sync-Nachrichten aktivieren.
    #     Das wird vom separaten Velocity-Addon genutzt, um
    #     netzwerkweite Bans sofort nach Backend-Aktionen durchzusetzen.
    #     Benötigt database.type=MARIADB für sicheren Shared-Storage.
    enabled: false

    # EN: Custom plugin messaging channel. Must match the Velocity addon.
    # DE: Custom-Plugin-Messaging-Channel. Muss mit dem Velocity-Addon übereinstimmen.
    channel: starbans:sync

# ----------------------------------------------------------
# EN: Security configuration.
# DE: Sicherheits-Konfiguration.
# ----------------------------------------------------------
security:
  ip-tracking:
    # EN: Store the last known IP of joining players.
    # DE: Letzte bekannte IP von beitretenden Spielern speichern.
    store-last-ip: true

  vpn-detection:
    # EN: Enable proxy / VPN checks during async pre-login.
    # DE: Proxy-/VPN-Prüfung während des asynchronen Login-Checks aktivieren.
    enabled: false
    # EN: Supported provider right now: PROXYCHECK.
    # DE: Aktuell unterstützter Provider: PROXYCHECK.
    provider: PROXYCHECK
    # EN: Optional API key for the provider.
    # DE: Optionaler API-Key für den Provider.
    api-key: ''
    # EN: Request timeout in milliseconds.
    # DE: Anfrage-Timeout in Millisekunden.
    timeout-ms: 3000
    # EN: Action when a VPN / proxy is detected. Supported: NOTE, BLOCK.
    # DE: Aktion bei erkanntem VPN / Proxy. Unterstützt: NOTE, BLOCK.
    action: NOTE
    # EN: Create an automatic note for the detected player.
    # DE: Automatisch eine Notiz für den betroffenen Spieler erstellen.
    create-note-on-detect: true
    # EN: Label used for the automatically created note.
    # DE: Label für die automatisch erstellte Notiz.
    note-label: vpn
    # EN: Text prefix for the automatically created note.
    # DE: Text-Prefix für die automatisch erstellte Notiz.
    note-template: 'VPN / proxy suspected'

# ----------------------------------------------------------
# EN: Staff alert system for join intelligence and security events.
# DE: Staff-Alert-System für Join-Intelligence und Sicherheitsereignisse.
# ----------------------------------------------------------
staff-alerts:
  enabled: true
  permission: starbans.alerts.receive
  send-to-console: true
  joins:
    # EN: Alert staff when players with moderation history or flagged relations join.
    # DE: Benachrichtigt Staff, wenn Spieler mit Moderationsverlauf oder markanten Verknüpfungen joinen.
    enabled: true
    # EN: Minimum visible cases on the joining player before an alert is sent.
    # DE: Minimale sichtbare Cases des joinenden Spielers, bevor ein Alert gesendet wird.
    minimum-visible-cases: 1
    # EN: Also alert when the player has an active mute.
    # DE: Ebenfalls alarmieren, wenn der Spieler einen aktiven Mute hat.
    notify-for-active-mutes: true
    # EN: Also alert when the player is currently on the watchlist.
    # DE: Ebenfalls alarmieren, wenn der Spieler aktuell auf der Watchlist steht.
    notify-for-watchlist: true
    # EN: Scan same-IP profiles and alert if related accounts already have moderation history.
    # DE: Prüft Profile mit derselben IP und alarmiert, wenn verknüpfte Accounts bereits Moderationsverlauf haben.
    notify-for-flagged-related-accounts: true
    # EN: Maximum related profiles scanned for moderation history during login.
    # DE: Maximale Anzahl verknüpfter Profile, die beim Login auf Moderationsverlauf geprüft werden.
    related-scan-limit: 10
    # EN: Maximum related account names shown inside alerts and webhooks.
    # DE: Maximale Anzahl an verknüpften Account-Namen in Alerts und Webhooks.
    related-preview-limit: 3
    exemptions:
      enabled: true
      # EN: Skip join alerts for these exact player names.
      # DE: Join-Alerts für diese exakten Spielernamen überspringen.
      player-names: []
      # EN: Skip join alerts for these UUIDs.
      # DE: Join-Alerts für diese UUIDs überspringen.
      player-uuids: []
      # EN: Skip join alerts for trusted IPs.
      # DE: Join-Alerts für vertrauenswürdige IPs überspringen.
      trusted-ips: [ "127.0.0.1" ]
      # EN: Skip join alerts entirely on these rule profiles / backends.
      # DE: Join-Alerts auf diesen Regelprofilen / Backends komplett überspringen.
      server-profiles: []
  vpn-detected:
    # EN: Notify staff when VPN / proxy detection flags a login.
    # DE: Benachrichtigt Staff, wenn die VPN-/Proxy-Erkennung einen Login markiert.
    enabled: true
  alt-detected:
    enabled: true

# ----------------------------------------------------------
# EN: Broadcasts to online players.
# DE: Broadcasts an online Spieler.
# ----------------------------------------------------------
broadcasts:
  player-ban:
    enabled: true
  ip-ban:
    enabled: true
  player-mute:
    enabled: false
  kick:
    enabled: false

# ----------------------------------------------------------
# EN: Default text and moderation behaviour.
# DE: Standardtexte und Moderationsverhalten.
# ----------------------------------------------------------
notes:
  default-label: general-note
  default-text: 'No additional note provided.'
  default-visibility: INTERNAL
  console-limit: 10

alt-flags:
  default-label: alt-account
  default-note: 'Linked as a suspicious / alternate account.'

warnings:
  default-reason: '&7No reason specified.'
  default-points: 1
  default-category: conduct
  default-duration: 30d
  escalation:
    enabled: true
    steps:
      - threshold: 3
        action: MUTE
        duration: 12h
        reason: '&6Automatic mute after {warning_points} warning points.'
        tags: [ auto-escalation, warnings ]
      - threshold: 6
        action: BAN
        duration: 7d
        reason: '&cAutomatic ban after {warning_points} warning points.'
        tags: [ auto-escalation, warnings ]

watchlist:
  default-label: watchlist
  default-category: security
  default-reason: '&eAdded to watchlist.'

alt-detection:
  enabled: true
  minimum-score: 4
  name-prefix-threshold: 4
  warn-threshold: 2
  max-reasons: 4
  auto-note:
    enabled: false
    label: alt-detected
    template: 'Suspicious alt pattern detected'
  auto-alt-flag:
    enabled: false
    label: auto-alt-detected
    note: 'Automatically flagged by join analysis.'

cases:
  undo-note: '&7Action reverted manually.'
  reopen-note: '&7Case reopened manually.'

audit:
  console-limit: 5

templates:
  entries:
    cheating-ban:
      enabled: true
      display-name: Cheating Ban
      type: BAN
      category: cheating
      reason: '&cCheating / unfair advantage.'
      duration: 30d
      tags: [ cheat, combat ]
    toxicity-mute:
      enabled: true
      display-name: Toxicity Mute
      type: MUTE
      category: chat
      reason: '&6Toxic chat behaviour.'
      duration: 12h
      tags: [ toxicity, chat ]
    advertising-warn:
      enabled: true
      display-name: Advertising Warn
      type: WARN
      category: advertising
      reason: '&eAdvertising is not allowed.'
      points: 2
      duration: 14d
      tags: [ advertising ]
    watch-suspicious:
      enabled: true
      display-name: Suspicious Watchlist
      type: WATCHLIST
      category: security
      reason: '&eSuspicious activity, observe on join.'
      duration: 30d
      tags: [ security, monitor ]
    appeal-note:
      enabled: true
      display-name: Appeal Note
      type: NOTE
      label: appeal
      category: appeals
      reason: '&bAppeal context added by template.'
      visibility: INTERNAL
      tags: [ appeal ]

punishments:
  defaults:
    ban-reason: '&7No reason specified.'
    mute-reason: '&7No reason specified.'
    ip-ban-reason: '&7No reason specified.'
    ip-blacklist-reason: '&7No reason specified.'
    kick-reason: '&7No reason specified.'
    unban-note: '&7No reason specified.'
    resolve-note: '&7Resolved manually.'
    expired-note: '&7Case duration elapsed.'

  player-ban:
    kick-online-player: true

  player-mute:
    notify-player: true

  ip-ban:
    kick-online-player: true

commands:
  # EN: Number of case entries shown in console output.
  # DE: Anzahl der Case-Einträge in der Konsolen-Ausgabe.
  console-history-limit: 10

feedback:
  # EN: Little note: this sends feedback straight to the StarBans developer with love <3 If you do not want that, just remove the URL below and it is disabled.
  # DE: Kleine Notiz: Das schickt Feedback mit ganz viel Liebe direkt an den StarBans-Developer <3 Wenn du das nicht möchtest, lösch einfach die URL unten und dann ist es deaktiviert.
  # EN: Remote text endpoint returning a Discord webhook URL.
  # DE: Remote-Text-Endpoint, der eine Discord-Webhook-URL zurückgibt.
  endpoint-url: https://hub.star-dev.xyz/starbans/feedbackwebhook.txt
  # EN: HTTP timeout for feedback endpoint fetch and webhook delivery.
  # DE: HTTP-Timeout für Feedback-Endpoint und Webhook-Zustellung.
  timeout-ms: 5000

server-rules:
  active-profile: default
  profiles:
    default:
      display-name: Global
      defaults: {}
      default-tags:
        global: []
      webhook-actions: {}
      flags: {}
    # survival:
    #   display-name: Survival
    #   defaults:
    #     ban-reason: '&cSurvival rules violation.'
    #   default-tags:
    #     global: [ survival ]
    #     warn: [ warnings, survival ]
    #   webhook-actions:
    #     ban: survival-ban
    #     join-alert: survival-join-alert
    #   flags:
    #     broadcasts.player-ban: true

# ----------------------------------------------------------
# EN: Update checker.
# DE: Update-Checker.
# ----------------------------------------------------------
update-checker:
  enabled: true
  notify-on-join: true
  version-url: https://hub.star-dev.xyz/starbans/version.txt
  download-url: https://hub.star-dev.xyz/starbans

# ----------------------------------------------------------
# EN: Discord webhook settings now live in plugins/StarBans/discord-webhooks.yml.
#     This keeps the main config shorter and allows much richer per-action layouts.
# DE: Discord-Webhook-Einstellungen liegen jetzt in plugins/StarBans/discord-webhooks.yml.
#     Dadurch bleibt die Haupt-Config übersichtlicher und jede Aktion kann deutlich reicher gestaltet werden.

# ----------------------------------------------------------
# EN: Sound system. Every GUI interaction can be styled here.
#     Invalid sound names are ignored and logged once they are used.
# DE: Sound-System. Jede GUI-Interaktion kann hier gestaltet werden.
#     Ungültige Sound-Namen werden ignoriert und bei Nutzung geloggt.
# ----------------------------------------------------------
sounds:
  gui:
    open:
      enabled: true
      sound: BLOCK_AMETHYST_BLOCK_CHIME
      volume: 0.9
      pitch: 1.15
    navigate:
      enabled: true
      sound: ITEM_BOOK_PAGE_TURN
      volume: 0.75
      pitch: 1.0
    success:
      enabled: true
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      volume: 0.85
      pitch: 1.2
    error:
      enabled: true
      sound: BLOCK_NOTE_BLOCK_BASS
      volume: 0.8
      pitch: 0.7
    prompt:
      enabled: true
      sound: BLOCK_NOTE_BLOCK_PLING
      volume: 0.9
      pitch: 1.35
    resolve:
      enabled: true
      sound: BLOCK_BEACON_POWER_SELECT
      volume: 0.85
      pitch: 1.0

# ----------------------------------------------------------
# EN: GUI design and moderation actions.
# DE: GUI-Design und Moderationsaktionen.
# EN: Inline `name` / `lore` values stay fully configurable here.
#     If a language file contains `gui-items.<config-path>.name` or `.lore`,
#     those translated GUI texts automatically override the inline defaults.
# DE: Inline-`name`- / `lore`-Werte bleiben hier vollständig konfigurierbar.
#     Wenn die Sprachdatei `gui-items.<config-pfad>.name` oder `.lore` enthält,
#     überschreiben diese übersetzten GUI-Texte automatisch die Inline-Standards.
# ----------------------------------------------------------
gui:
  shared:
    filler:
      material: BLACK_STAINED_GLASS_PANE
      name: ' '
      flags: [ HIDE_ATTRIBUTES ]

  # EN: /sb main menu. Entry point for the full moderation GUI flow.
  # DE: /sb Hauptmenü. Einstiegspunkt für den kompletten Moderations-GUI-Flow.
  main-menu:
    size: 27
    slots:
      browser: 11
      activity: 13
      stats: 15
      close: 22
    browser:
      material: PLAYER_HEAD
      name: '&#FFB84D&lPlayer Browser'
      lore:
        - '&8Known players: &f{known_players}'
        - '&8Stored cases: &f{case_count}'
        - '&7Open the full player browser.'
    activity:
      material: COMPASS
      name: '&b&lRecent Activity'
      lore:
        - '&8Total cases: &f{case_count}'
        - '&7Open the global case / staff activity log.'
    stats:
      material: NETHER_STAR
      name: '&e&lOverview'
      lore:
        - '&8Known players: &f{known_players}'
        - '&8Active bans: &f{ban_count}'
        - '&8Active IP bans: &f{ip_ban_count}'
        - '&8Active mutes: &f{mute_count}'
        - '&8All cases: &f{case_count}'
    close:
      material: BARRIER
      name: '&cClose'
      lore:
        - '&7Close this GUI.'

  player-browser:
    size: 54
    player-slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
    player-head:
      material: PLAYER_HEAD
      name: '&#FFB84D&l{player}'
      lore:
        - '&8State: &f{online_status}'
        - '&8Status: &f{status}'
        - '&8Cases: &f{case_count}'
        - '&8Notes: &f{note_count}'
        - '&8Alt flags: &f{alt_count}'
        - '&8Last IP: &f{last_ip}'
        - '&8Last seen: &f{last_seen}'
        - '&7Click to open the moderation menu.'
    navigation:
      home-slot: 46
      previous-slot: 48
      next-slot: 50
      close-slot: 49
      home:
        material: NETHER_STAR
        name: '&eMain Menu'
        lore:
          - '&7Return to the StarBans main GUI.'
      previous:
        material: ARROW
        name: '&ePrevious page'
        lore:
          - '&7Open the previous player page.'
      next:
        material: ARROW
        name: '&eNext page'
        lore:
          - '&7Open the next player page.'
      close:
        material: BARRIER
        name: '&cClose'
        lore:
          - '&7Close this GUI.'

  action-menu:
    size: 54
    slots:
      header: 13
      permanent-ban: 29
      unban: 33
      permanent-mute: 31
      unmute: 35
      notes: 39
      add-note: 41
      related: 43
      back: 45
      history: 49
      close: 53
    header:
      material: PLAYER_HEAD
      name: '&#FFB84D&l{player}'
      lore:
        - '&8State: &f{online_status}'
        - '&8Last IP: &f{last_ip}'
        - '&8First seen: &f{first_seen}'
        - '&8Last seen: &f{last_seen}'
        - '&8Active ban: &f{ban_status}'
        - '&8Active mute: &f{mute_status}'
        - '&8Cases: &f{case_count}'
        - '&8Notes: &f{note_count}'
        - '&8Alt flags: &f{alt_count}'
        - '&8Last case: &f{last_case_type}'
    permanent-ban:
      material: REDSTONE_BLOCK
      name: '&c&lPermanent Ban'
      lore:
        - '&7Immediately ban this player permanently.'
      reason: '&cSevere rule violation'
      glow: true
    unban:
      material: LIME_DYE
      name: '&a&lUnban'
      lore:
        - '&7Remove the active ban from this player.'
      reason: '&aRemoved through the StarBans GUI'
    permanent-mute:
      material: ORANGE_DYE
      name: '&6&lPermanent Mute'
      lore:
        - '&7Mute this player permanently.'
      reason: '&6Chat abuse / severe toxicity'
    unmute:
      material: YELLOW_DYE
      name: '&e&lUnmute'
      lore:
        - '&7Remove the active mute from this player.'
      reason: '&eRemoved through the StarBans GUI'
    history:
      material: BOOK
      name: '&b&lCase History'
      lore:
        - '&7Open the full moderation case history.'
    notes:
      material: WRITABLE_BOOK
      name: '&b&lStaff Notes'
      lore:
        - '&7Open all notes for this player.'
    add-note:
      material: FEATHER
      name: '&e&lAdd Note'
      lore:
        - '&7Start chat input for a staff note.'
        - '&8Type your note in chat or write'
        - '&8cancel to abort.'
      default-label: gui-note
    related:
      material: NAME_TAG
      name: '&d&lRelated Accounts'
      lore:
        - '&7Open same-IP / related accounts.'
    back:
      material: ARROW
      name: '&eBack'
      lore:
        - '&7Return to the player browser.'
    close:
      material: BARRIER
      name: '&cClose'
      lore:
        - '&7Close the GUI.'
    temp-ban-presets:
      one-hour:
        slot: 19
        material: CLOCK
        name: '&e&l1 Hour Ban'
        lore:
          - '&7Preset for spam / chat abuse.'
        duration: 1h
        reason: '&eSpam / chat abuse'
      one-day:
        slot: 20
        material: CLOCK
        name: '&6&l1 Day Ban'
        lore:
          - '&7Preset for toxicity / insults.'
        duration: 1d
        reason: '&6Toxic behaviour'
      seven-days:
        slot: 21
        material: CLOCK
        name: '&c&l7 Day Ban'
        lore:
          - '&7Preset for repeated griefing / exploits.'
        duration: 7d
        reason: '&cRepeated griefing / exploit abuse'
    temp-mute-presets:
      thirty-minutes:
        slot: 23
        material: PAPER
        name: '&e&l30 Minute Mute'
        lore:
          - '&7Preset for minor spam.'
        duration: 30m
        reason: '&eMinor spam'
      two-hours:
        slot: 24
        material: PAPER
        name: '&6&l2 Hour Mute'
        lore:
          - '&7Preset for flaming / toxicity.'
        duration: 2h
        reason: '&6Flaming / toxicity'
      one-day:
        slot: 25
        material: PAPER
        name: '&c&l1 Day Mute'
        lore:
          - '&7Preset for repeated chat abuse.'
        duration: 1d
        reason: '&cRepeated chat abuse'

  history:
    size: 54
    entry-slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
    slots:
      header: 4
      back: 45
      close: 49
    previous-slot: 48
    next-slot: 50
    header:
      material: PLAYER_HEAD
      name: '&#FFB84D&l{player}'
      lore:
        - '&8Total cases: &f{case_count}'
